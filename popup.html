<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomscroll Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        :root {
          --accent: #ff3040;
          --accent-glow: rgba(255, 48, 64, 0.3);
          --primary-gradient: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
          --bg: #ffffff;
          --surface: #fcfcfc;
          --text-main: #1a1a1b;
          --text-sub: #8e8e93;
          --border: #efeff4;
          --shadow: rgba(0, 0, 0, 0.05);
          --btn-bg: #f0f0f5;
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #000000;
            --surface: #121212;
            --card-bg: #1c1c1e;
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --border: #2c2c2e;
            --shadow: rgba(0, 0, 0, 0.5);
            --btn-bg: #1c1c1e;
          }
        }

        * { box-sizing: border-box; }
        
        body {
          margin: 0; padding: 16px 20px; width: 280px;
          font-family: 'Inter', -apple-system, sans-serif;
          background: var(--bg); color: var(--text-main);
          user-select: none;
          display: flex; flex-direction: column; align-items: center;
          overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; position: relative; width: 100%; }
        .ig-logo { width: 18px; height: 18px; fill: url(#ig-grad); }
        .logo-text { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-main); }
        .alias { position: absolute; bottom: -12px; font-size: 7px; font-weight: 800; color: var(--text-sub); opacity: 0.6; letter-spacing: 1.5px; }

        .mode-badge {
            font-size: 8px; font-weight: 900; color: var(--accent); border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px;
            margin-top: 14px; margin-bottom: 20px; letter-spacing: 0.5px; display: inline-block;
        }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; width: 100%; }
        .action-item { position: relative; cursor: pointer; }
        .action-item input { position: absolute; opacity: 0; }
        .action-box {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 56px; border-radius: 14px; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
          background: var(--surface); border: 1px solid var(--border);
        }
        .action-item input:checked + .action-box { border-color: var(--accent); background: var(--bg); box-shadow: 0 8px 20px var(--accent-glow); }
        .action-item svg { width: 18px; height: 18px; fill: var(--text-sub); margin-bottom: 4px; transition: 0.3s; }
        .action-item input:checked + .action-box svg { fill: #dc2743; }
        .action-item span { font-size: 9px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; }
        .action-item input:checked + .action-box span { color: var(--text-main); }

        /* Status Bar - Soft & Center */
        .status-bar { 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 16px; width: 100%; min-height: 32px; padding: 0 10px;
        }
        #statusLabel { 
            font-size: 11px; font-weight: 500; color: var(--text-sub); text-align: center; 
            line-height: 1.4; transition: 0.3s;
        }

        /* Master Engine Button */
        .controls { margin-bottom: 28px; position: relative; }
        .btn-main {
          border: 3px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none;
          width: 88px; height: 88px; border-radius: 50%;
          background: var(--btn-bg); color: var(--text-main);
          box-shadow: 0 10px 25px var(--shadow);
          position: relative; z-index: 2;
        }
        
        @keyframes pulse-aura {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .btn-main::before {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: inherit; border-radius: 50%; z-index: -1;
            transition: 0.5s;
        }
        .btn-main.is-running::before { background: var(--accent); animation: pulse-aura 2s infinite ease-out; }
        .btn-main.is-paused::before { background: #ff9500; animation: pulse-aura 3s infinite ease-out; }

        .btn-main:hover { transform: scale(1.05); border-color: var(--text-sub); }
        .btn-main.is-running { background: var(--accent); color: white; border-color: rgba(255,255,255,0.3); box-shadow: 0 15px 35px var(--accent-glow); }
        .btn-main.is-paused { background: #ff9500; color: white; border-color: rgba(255,255,255,0.3); }
        
        #btnCount { font-size: 42px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
        #btnLabel { font-size: 15px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Instruction Card - Compact with Icon */
        #instructions {
            width: 100%; background: var(--surface); border-radius: 12px; padding: 12px;
            margin-bottom: 12px; border: 1px solid var(--border); font-size: 9.5px; line-height: 1.4; color: var(--text-sub);
            position: relative;
            display: flex; gap: 10px; align-items: flex-start;
        }
        .instr-icon { flex-shrink: 0; margin-top: 2px; color: var(--text-sub); opacity: 0.7; }
        .instr-body { text-align: left; }
        .instr-body b { color: inherit; filter: brightness(1.1); font-weight: 800; }

        .footer { width: 100%; padding-top: 15px; border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .github-link { display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 10px; font-weight: 800; color: var(--text-sub); transition: 0.3s; }
        .github-link:hover { color: var(--text-main); }
        .github-link svg { width: 14px; height: 14px; fill: currentColor; }
    </style>
</head>
<body>

<svg style="width:0;height:0;position:absolute;">
  <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#f09433" />
    <stop offset="25%" style="stop-color:#e6683c" />
    <stop offset="50%" style="stop-color:#dc2743" />
    <stop offset="75%" style="stop-color:#cc2366" />
    <stop offset="100%" style="stop-color:#bc1888" />
  </linearGradient>
</svg>

<div class="header">

    <span class="logo-text">Doomscroll Bot</span>
    <span class="alias">THE ULTIMATE HISTORY REWRITER</span>
</div>

<span class="mode-badge">CHOOSE ACTIVITIES</span>

<div class="action-grid">
    <label class="action-item">
        <input type="checkbox" name="action" value="LIKE" checked>
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>Like</span>
        </div>
    </label>
    <label class="action-item">
        <input type="checkbox" name="action" value="REPOST">
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            <span>Repost</span>
        </div>
    </label>
    <label class="action-item">
        <input type="checkbox" name="action" value="SAVE">
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            <span>Save</span>
        </div>
    </label>
</div>

<div class="status-bar">
    <span id="statusLabel">System Idle</span>
</div>

<div class="controls">
    <button id="btnPlay" class="btn-main">
        <span id="btnLabel">START</span>
        <span id="btnCount" style="display:none">0</span>
    </button>
</div>

<div id="instructions">
    <div class="instr-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6m-6 3h6M12 2a7 7 0 0 0-7 7c0 2.45 1.5 4.34 3 5.5V18h8v-3.5c1.5-1.16 3-3.05 3-5.5a7 7 0 0 0-7-7z"></path></svg>
    </div>
    <div class="instr-body">
        <b>MISSION:</b> Refine your digital history on your own terms. Human-like pacing is enforced for account safety.
    </div>
</div>

<div class="footer">
    <a href="https://github.com/publicwasant/doomscroll-bot" target="_blank" class="github-link">

        <span>GitHub Open Source</span>
    </a>
</div>

<script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomscroll Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
          --accent: #ff3040;
          --accent-glow: rgba(255, 48, 64, 0.2);
          --ig-gradient: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
          --bg: #ffffff;
          --surface: #f7f7f8;
          --surface-hover: #efeff0;
          --text-main: #000000;
          --text-sub: #65676b;
          --border: #e4e6eb;
          --tag-bg: #f2f2f3;
          --tag-user: #0095f6;
          --tag-kw: var(--text-main);
          --radius-lg: 16px;
          --radius-md: 12px;
          --radius-sm: 8px;
          --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
          --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text-main: #ffffff;
            --text-sub: #a0a0a2;
            --border: #3a3a3c;
            --tag-bg: #2c2c2e;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.6);
          }
        }

        * { 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        
        *::-webkit-scrollbar {
            display: none; /* Chrome/Safari/Opera */
        }

        body {
          margin: 0; padding: 20px; width: 320px;
          font-family: 'Inter', -apple-system, sans-serif;
          background: var(--bg); color: var(--text-main);
          user-select: none;
          display: flex; flex-direction: column;
          overflow-x: hidden;
        }

        .header { 
          display: flex; flex-direction: column; align-items: center; 
          margin-bottom: 24px; position: relative; 
        }
        .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .ig-logo { width: 22px; height: 22px; fill: url(#ig-grad); }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
        .alias { font-size: 8px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        .version { position: absolute; top: -10px; right: -10px; font-size: 9px; font-weight: 600; color: var(--text-sub); opacity: 0.5; }

        .section-label {
            font-size: 11px; font-weight: 700; color: var(--text-sub); 
            margin: 16px 0 10px 0; letter-spacing: 0.3px;
        }

        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .action-item { position: relative; cursor: pointer; }
        .action-item input { position: absolute; opacity: 0; }
        .action-box {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 64px; border-radius: var(--radius-md); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
          background: var(--surface); border: 1.5px solid transparent;
        }
        .action-item:hover .action-box { background: var(--surface-hover); }
        .action-item input:checked + .action-box { 
          background: var(--bg); 
          border-color: var(--accent);
          box-shadow: var(--shadow-sm);
        }
        .action-item svg { width: 20px; height: 20px; fill: var(--text-sub); margin-bottom: 6px; }
        .action-item input:checked + .action-box svg { fill: var(--accent); transform: scale(1.1); }
        .action-item span { font-size: 10px; font-weight: 600; color: var(--text-sub); }

        .filter-container { width: 100%; position: relative; }
        
        .segmented-control { 
            display: flex; background: var(--surface); border-radius: 10px; 
            padding: 3px; margin-bottom: 12px; border: 1px solid var(--border);
        }
        .segment-btn { 
            flex: 1; font-size: 10px; font-weight: 700; padding: 8px; border-radius: 7px; 
            cursor: pointer; text-align: center; color: var(--text-sub); transition: 0.2s;
        }
        .segment-btn.active { 
            background: var(--bg); color: var(--text-main); 
            box-shadow: var(--shadow-sm);
        }

        .input-group { position: relative; width: 100%; }
        #filterInput {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; 
            font-family: inherit; color: var(--text-main); outline: none; transition: 0.2s;
        }
        #filterInput:focus { border-color: var(--text-sub); background: var(--bg); }

        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-md); margin-top: 8px; max-height: 160px; 
            overflow-y: auto; box-shadow: var(--shadow-md); display: none;
        }
        .suggestion-item { 
            padding: 12px 16px; font-size: 13px; cursor: pointer; 
            border-bottom: 1px solid var(--border); transition: 0.2s;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .suggestion-item:last-child { border-bottom: none; }
        .suggestion-item:hover, .suggestion-item.selected { background: var(--surface); }
        .suggestion-item b { color: var(--tag-user); }

        .tags-display-wrapper {
            position: relative; margin-top: 10px; width: 100%;
            overflow: hidden;
        }
        .tags-display-wrapper::after {
            content: ''; position: absolute; right: 0; top: 0; bottom: 0;
            width: 40px; pointer-events: none;
            background: linear-gradient(to right, transparent, var(--bg));
        }
        .tags-display { 
            display: flex; gap: 6px; padding: 8px 0;
            overflow-x: auto; white-space: nowrap;
            user-select: none;
            cursor: grab;
        }
        .tags-display:active { cursor: grabbing; }

        .tag {
            flex-shrink: 0;
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 6px; 
            border-radius: 4px; font-size: 9px; font-weight: 600; 
            background: var(--tag-bg); color: var(--text-main);
            border: 1px solid var(--border);
            transition: 0.2s;
        }
        .tag.tag-user { color: var(--tag-user); border-color: rgba(0, 149, 246, 0.2); background: transparent; }
        .tag.tag-kw { 
            color: var(--text-main); 
            background: var(--tag-bg); 
            border-color: var(--border); 
        }
        
        .tag-remove { cursor: pointer; opacity: 0.4; font-size: 12px; margin-left: 1px; }
        .tag-remove:hover { opacity: 1; }

        .bot-center { 
          display: flex; flex-direction: column; align-items: center; 
          margin: 24px 0 32px 0;
        }
        .status-container { margin-bottom: 16px; height: 36px; display: flex; align-items: center; justify-content: center; width: 100%; }
        #statusLabel { font-size: 13px; font-weight: 500; color: var(--text-sub); text-align: center; }

        .btn-main {
          border: 4px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); outline: none;
          width: 90px; height: 90px; border-radius: 50%;
          background: var(--surface); color: var(--text-main);
          box-shadow: var(--shadow-md); position: relative;
        }
        .btn-main:hover { transform: scale(1.04); }
        .btn-main.is-running { background: var(--accent); color: white; border-color: rgba(255,255,255,0.2); }
        .btn-main.is-running::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 2px solid var(--accent);
            animation: ripple 2s infinite;
        }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        #btnCount { font-size: 40px; font-weight: 800; letter-spacing: -2px; }
        #btnLabel { font-size: 15px; font-weight: 800; letter-spacing: 1px; }

        .hint-box {
            background: var(--surface); border-radius: var(--radius-md); padding: 12px;
            margin-bottom: 20px; border: 1px solid var(--border); font-size: 11px; 
            line-height: 1.4; color: var(--text-sub); display: flex; gap: 10px;
        }

        .footer { 
          padding-top: 16px; border-top: 1px solid var(--border); 
          display: flex; justify-content: center; 
        }
        .github-link { 
          display: flex; align-items: center; gap: 8px; text-decoration: none; 
          font-size: 11px; font-weight: 700; color: var(--text-sub); transition: 0.2s; 
        }
        .github-link svg { width: 16px; height: 16px; fill: currentColor; }
    </style>
</head>
<body>

<svg style="width:0;height:0;position:absolute;">
  <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#f09433" />
    <stop offset="25%" style="stop-color:#e6683c" />
    <stop offset="50%" style="stop-color:#dc2743" />
    <stop offset="75%" style="stop-color:#cc2366" />
    <stop offset="100%" style="stop-color:#bc1888" />
  </linearGradient>
</svg>

<div class="header">
    <div class="header-top">
        <svg class="ig-logo" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.85.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.161-1.666 4.703-4.919 4.85-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.85-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.161 1.665-4.704 4.919-4.85 1.265-.058 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c.796 0 1.441.645 1.441 1.44s-.645 1.44-1.441 1.44c-.795 0-1.44-.645-1.44-1.44s.645-1.44 1.44-1.44z"/></svg>
        <span class="logo-text">Doomscroll Bot</span>
    </div>
    <span class="alias">The History Redactor</span>
    <span class="version">v<span id="versionLabel">1.2.1</span></span>
</div>

<div class="section-label">Activities</div>
<div class="action-grid">
    <label class="action-item">
        <input type="checkbox" name="action" value="LIKE" checked>
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            <span>Like</span>
        </div>
    </label>
    <label class="action-item">
        <input type="checkbox" name="action" value="REPOST">
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            <span>Repost</span>
        </div>
    </label>
    <label class="action-item">
        <input type="checkbox" name="action" value="SAVE">
        <div class="action-box">
            <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            <span>Save</span>
        </div>
    </label>
</div>

<div class="section-label">Redaction Filters</div>
<div class="filter-container">
    <div class="segmented-control">
        <div class="segment-btn active" data-mode="EXCLUDE">EXCLUDE</div>
        <div class="segment-btn" data-mode="ONLY_MATCH">ONLY MATCH</div>
    </div>
    
    <div class="input-group">
        <input type="text" id="filterInput" placeholder="Keyword or @username" autocomplete="off">
        <div id="suggestionBox" class="suggestions"></div>
    </div>

    <div class="tags-display-wrapper">
        <div id="tagsDisplay" class="tags-display"></div>
    </div>
</div>

<div class="bot-center">
    <div class="status-container">
        <span id="statusLabel">System Standby</span>
    </div>
    
    <button id="btnPlay" class="btn-main">
        <span id="btnLabel">INITIATE</span>
        <span id="btnCount" style="display:none">0</span>
    </button>
</div>

<div class="hint-box">
    <div><b>Tip:</b> Targeted redaction uses <b>Only Match</b> mode to process specific items.</div>
</div>

<div class="footer">
    <a href="https://github.com/publicwasant/doomscroll-bot" target="_blank" class="github-link">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.419 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
        <span>GitHub Repository</span>
    </a>
</div>

<script src="popup.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doomscroll Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
          --accent: #ff3040;
          --accent-glow: rgba(255, 48, 64, 0.1);
          --ig-gradient: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
          --bg: #ffffff;
          --surface: #f7f7f8;
          --surface-hover: #efeff0;
          --text-main: #000000;
          --text-sub: #65676b;
          --border: #e4e6eb;
          --tag-bg: #f2f2f3;
          --tag-link: #0095f6;
          --radius-lg: 16px;
          --radius-md: 12px;
          --radius-sm: 8px;
          --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
          --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
          --yellow: #ffcc00;
        }

        @media (prefers-color-scheme: dark) {
          :root {
            --bg: #000000;
            --surface: #1c1c1e;
            --surface-hover: #2c2c2e;
            --text-main: #ffffff;
            --text-sub: #a0a0a2;
            --border: #3a3a3c;
            --tag-bg: #2c2c2e;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.6);
          }
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        *::-webkit-scrollbar { display: none; }

        body {
          margin: 0; padding: 20px; width: 320px;
          font-family: 'Inter', -apple-system, sans-serif;
          background: var(--bg); color: var(--text-main);
          user-select: none; display: flex; flex-direction: column;
          overflow-x: hidden;
        }

        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; position: relative; width: 100%; }
        .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .ig-logo { width: 22px; height: 22px; fill: url(#ig-grad); }
        .logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
        .alias { font-size: 8px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }

        .settings-container { position: absolute; top: -10px; right: -10px; z-index: 1000; }
        .btn-settings { background: none; border: none; padding: 10px; cursor: pointer; color: var(--text-sub); transition: 0.2s; opacity: 0.6; }
        .btn-settings:hover { opacity: 1; color: var(--text-main); }
        .btn-settings svg { width: 18px; height: 18px; fill: currentColor; }

        .settings-menu {
            position: absolute; top: 100%; right: 10px; z-index: 1100;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-md); width: 180px;
            box-shadow: var(--shadow-md); display: none; padding: 8px 0;
        }
        .settings-section-title { padding: 8px 16px; font-size: 10px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .settings-item { padding: 10px 16px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .settings-item:hover { background: var(--surface); }
        .settings-item.danger { color: var(--accent); }

        .speed-control { padding: 4px 16px 12px 16px; }
        .speed-labels { display: flex; justify-content: space-between; font-size: 9px; color: var(--text-sub); margin-top: 4px; }
        #speedSlider { width: 100%; height: 4px; -webkit-appearance: none; background: var(--border); border-radius: 2px; outline: none; margin: 10px 0; }
        #speedSlider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--tag-link); cursor: pointer; border: 2px solid var(--bg); }

        .section-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin: 16px 0 10px 0; }
        
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .action-item { cursor: pointer; position: relative; }
        .action-item input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 2; }
        .action-box {
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          height: 64px; border-radius: var(--radius-md); transition: all 0.2s;
          background: var(--surface); border: 1.5px solid transparent; position: relative; z-index: 1;
        }
        .action-item input:checked + .action-box { background: var(--bg); border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .action-item svg { width: 20px; height: 20px; fill: var(--text-sub); margin-bottom: 6px; transition: 0.2s; }
        .action-item input:checked + .action-box svg { fill: var(--accent); transform: scale(1.1); }
        .action-item span { font-size: 10px; font-weight: 600; color: var(--text-sub); }
        .action-item input:checked + .action-box span { color: var(--accent); }

        .filter-container { width: 100%; position: relative; margin-top: 16px; }
        .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }

        .custom-dropdown { position: relative; }
        .dropdown-trigger {
            background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text-main); font-size: 12px; font-weight: 600; padding: 4px 10px;
            cursor: pointer; display: flex; align-items: center; gap: 4px;
        }
        .dropdown-menu {
            position: absolute; top: 100%; right: 0; z-index: 500;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-md); margin-top: 8px; width: 160px;
            box-shadow: var(--shadow-md); display: none; overflow: hidden;
        }
        .dropdown-item { padding: 10px 16px; font-size: 12px; cursor: pointer; border-bottom: 1px solid var(--border); transition: 0.2s; color: var(--text-main); }
        .dropdown-item:hover { background: var(--surface); }
        .dropdown-item.active { font-weight: 800; color: var(--tag-link); }

        .input-group { position: relative; width: 100%; transition: 0.3s; margin-top: 8px; }
        .input-group.hidden { display: none; }
        #filterInput { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 16px; font-size: 13px; outline: none; color: var(--text-main); }

        .suggestions {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 600;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius-md); margin-top: 4px; max-height: 160px; 
            overflow-y: auto; box-shadow: var(--shadow-md); display: none;
        }
        .suggestion-item { padding: 12px 16px; font-size: 13px; cursor: pointer; border-bottom: 1px solid var(--border); color: var(--text-main); }
        .suggestion-item:hover, .suggestion-item.selected { background: var(--surface); }
        .suggestion-item b { color: var(--tag-link); }

        .tags-display-wrapper { position: relative; margin-top: 10px; width: 100%; overflow: hidden; }
        .tags-display-wrapper.hidden { display: none; }
        .tags-display { display: flex; gap: 6px; padding: 4px 0; overflow-x: auto; cursor: grab; }

        .tag {
            flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; 
            border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--tag-bg);
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s; color: var(--text-main);
        }
        .tag.clickable { color: var(--tag-link); border-color: rgba(0, 149, 246, 0.3); }
        .tag-remove { cursor: pointer; opacity: 0.4; margin-left: 2px; font-size: 14px; }

        .bot-center { display: flex; flex-direction: column; align-items: center; margin: 24px 0 32px 0; }
        .status-container { margin-bottom: 16px; height: 36px; display: flex; align-items: center; }
        #statusLabel { font-size: 12px; font-weight: 500; color: var(--text-sub); text-align: center; }

        .btn-main {
          border: 4px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center;
          transition: 0.4s; width: 90px; height: 90px; border-radius: 50%;
          background: var(--tag-link); color: white; box-shadow: var(--shadow-md);
          position: relative;
        }
        .btn-main.is-running { background: var(--accent); border-color: rgba(255,255,255,0.2); }
        .btn-main.is-running::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--accent); animation: ripple 2s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
        .btn-main svg { width: 32px; height: 32px; fill: currentColor; }

        .hint-box {
            background: var(--surface); border-radius: var(--radius-md); padding: 12px;
            margin-bottom: 20px; border: 1px solid var(--border); font-size: 10px; 
            line-height: 1.4; color: var(--text-sub); display: flex; gap: 10px;
        }
        .hint-box svg { width: 14px; height: 14px; fill: var(--yellow); flex-shrink: 0; }

        .footer { padding-top: 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .github-link { display: flex; align-items: center; gap: 8px; text-decoration: none; font-size: 11px; font-weight: 700; color: var(--text-sub); }
        .github-link svg { width: 16px; fill: currentColor; }
        .version-label { font-size: 9px; font-weight: 600; color: var(--text-sub); opacity: 0.4; }
    </style>
</head>
<body>

<svg style="width:0;height:0;position:absolute;">
  <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#f09433" />
    <stop offset="25%" style="stop-color:#e6683c" />
    <stop offset="50%" style="stop-color:#dc2743" />
    <stop offset="75%" style="stop-color:#cc2366" />
    <stop offset="100%" style="stop-color:#bc1888" />
  </linearGradient>
</svg>

<div class="header">
    <div class="settings-container">
        <button id="btnSettings" class="btn-settings" title="Options">
            <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        </button>
        <div class="settings-menu" id="settingsMenu">
            <div class="settings-section-title">SPEED</div>
            <div class="speed-control">
                <input type="range" id="speedSlider" min="0.1" max="3" step="0.1" value="1">
                <div class="speed-labels"><span>Flash</span><span>Smooth</span></div>
            </div>
            <div style="height: 1px; background: var(--border); margin: 8px 0;"></div>
            <div class="settings-item" id="btnExport"><span>Export JSON</span></div>
            <div class="settings-item danger" id="btnReset"><span>Factory Reset</span></div>
        </div>
    </div>
    <div class="header-top">
        <svg class="ig-logo" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.85.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.161-1.666 4.703-4.919 4.85-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.85-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.161 1.665-4.704 4.919-4.85 1.265-.058 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.791-4-4 0-2.209 1.791-4 4-4s4 1.79 4 4c0 2.209-1.791 4-4 4zm6.406-11.845c.796 0 1.441.645 1.441 1.44s-.645 1.44-1.441 1.44c-.795 0-1.44-.645-1.44-1.44s.645-1.44 1.44-1.44z"/></svg>
        <span class="logo-text">Doomscroll Bot</span>
    </div>
    <span class="alias">Based DOM Automation</span>
</div>

<div class="section-label">Activities</div>
<div class="action-grid">
    <label class="action-item"><input type="checkbox" name="action" value="LIKE" checked><div class="action-box"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Like</span></div></label>
    <label class="action-item"><input type="checkbox" name="action" value="REPOST"><div class="action-box"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg><span>Repost</span></div></label>
    <label class="action-item"><input type="checkbox" name="action" value="SAVE"><div class="action-box"><svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg><span>Save</span></div></label>
</div>

<div class="filter-container">
    <div class="filter-header">
        <div class="section-label" style="margin: 0;">Redaction Filters</div>
        <div class="custom-dropdown" id="conditionDropdown">
            <div class="dropdown-trigger" id="conditionTrigger"><span id="currentConditionText">none</span><svg viewBox="0 0 24 24" style="width:12px; height:12px; fill:var(--text-sub)"><path d="M7 10l5 5 5-5z"/></svg></div>
            <div class="dropdown-menu" id="conditionMenu"></div>
        </div>
    </div>
    <div id="filterInputGroup" class="input-group">
        <input type="text" id="filterInput" placeholder="Keyword, @user, or #hashtag" autocomplete="off">
        <div id="suggestionBox" class="suggestions"></div>
    </div>
    <div id="tagsDisplayWrapper" class="tags-display-wrapper"><div id="tagsDisplay" class="tags-display"></div></div>
</div>

<div class="bot-center">
    <div class="status-container"><span id="statusLabel">System Standby</span></div>
    <button id="btnPlay" class="btn-main"><span id="btnLabel"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span><span id="btnCount" style="display:none; font-size: 40px; font-weight: 800; letter-spacing: -2px;">0</span></button>
</div>

<div class="hint-box">
    <svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C8.67 12.05 8 10.58 8 9c0-2.21 1.79-4 4-4s4 1.79 4 4c0 1.58-.67 3.05-2.15 4.1z"/></svg>
    <div style="flex: 1;">Support <b>@username</b> and <b>#hashtag</b> for precise targeting.</div>
</div>

<div class="footer">
    <a href="https://github.com/publicwasant/doomscroll-bot" target="_blank" class="github-link"><svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.419 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg><span>GitHub Repository</span></a>
    <span id="versionContainer" class="version-label" style="display:none">v<span id="versionLabel"></span></span>
</div>

<script src="popup.js"></script>
</body>
</html>
